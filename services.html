<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Guru Krupa Events</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Events Section -->
    <section id="services" class="services-section">
        <div class="container">
            <h2 class="section-title" style="margin-bottom: 40px;">OUR EVENTS</h2>
            <div class="services-grid image-grid">
                <div class="service-card image-card"
                    style="background-image: url('images/event_wedding_1783930177875.png');">
                    <div class="card-overlay"></div>
                    <h3>Wedding</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_engagement_1783930188239.png');">
                    <div class="card-overlay"></div>
                    <h3>Engagement</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_birthday_1783930198374.png');">
                    <div class="card-overlay"></div>
                    <h3>Birthday Party</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_babyshower_1783930208624.png');">
                    <div class="card-overlay"></div>
                    <h3>Baby Shower</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_naming_1783930219801.png');">
                    <div class="card-overlay"></div>
                    <h3>Naming Ceremony</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_housewarming_1783930230044.png');">
                    <div class="card-overlay"></div>
                    <h3>Housewarming</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_anniversary_1783930243303.png');">
                    <div class="card-overlay"></div>
                    <h3>Anniversary</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_corporate_1783930254294.png');">
                    <div class="card-overlay"></div>
                    <h3>Corporate Event</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_haldi_1783930264420.png');">
                    <div class="card-overlay"></div>
                    <h3>Haldi Ceremony</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_mehendi_1783930274784.png');">
                    <div class="card-overlay"></div>
                    <h3>Mehendi Ceremony</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_dandiya_1783930285311.png');">
                    <div class="card-overlay"></div>
                    <h3>Dandiya Night</h3>
                </div>
                <div class="service-card image-card"
                    style="background-image: url('images/event_reception_1783930295311.png');">
                    <div class="card-overlay"></div>
                    <h3>Reception</h3>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
